# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: dotnet

permissions: read-all

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to tag and create"
        required: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{ github.workspace }}/nuget

jobs:
  build-and-test:
    strategy:
      matrix:
        os:
          [
            ubuntu-latest,
            windows-latest,
            macos-latest,
          ]
        configuration: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2 # TODO: Pin to full SHA before merging to main
        with:
          egress-policy: audit

      - uses: actions/checkout@v4 # TODO: Pin to full SHA before merging to main

      - name: Setup .NET (global.json)
        uses: actions/setup-dotnet@v4 # TODO: Pin to full SHA before merging to main
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c ${{ matrix.configuration }} --no-restore

      - name: Test
        # TUnit uses Microsoft.Testing.Platform — run via dotnet run, not dotnet test
        run: |
          dotnet run --project src/Maple.StrongId.Test/Maple.StrongId.Test.csproj -c ${{ matrix.configuration }} --no-build
          dotnet run --project src/Maple.StrongId.Generators.Test/Maple.StrongId.Generators.Test.csproj -c ${{ matrix.configuration }} --no-build
          dotnet run --project src/Maple.StrongId.XyzTest/Maple.StrongId.XyzTest.csproj -c ${{ matrix.configuration }} --no-build

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2 # TODO: Pin to full SHA before merging to main
        with:
          egress-policy: audit
      - uses: actions/checkout@v4 # TODO: Pin to full SHA before merging to main
      - name: Setup .NET
        uses: actions/setup-dotnet@v4 # TODO: Pin to full SHA before merging to main
        with:
          global-json-file: global.json
      - name: Restore tools
        run: dotnet tool restore
      - name: CSharpier verify no changes
        run: dotnet csharpier check .
      - name: Format style verify no changes
        run: dotnet format style --verify-no-changes
      - name: Format analyzers verify no changes
        run: dotnet format analyzers --verify-no-changes

  pack:
    runs-on: windows-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2 # TODO: Pin to full SHA before merging to main
        with:
          egress-policy: audit
      - uses: actions/checkout@v4 # TODO: Pin to full SHA before merging to main
        with:
          fetch-depth: 0 # full history for MinVer
      - name: Create tag (to set version)
        if: ${{ github.event.inputs.version != '' && github.actor == 'Bia10' }}
        run: git tag v${{ github.event.inputs.version }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4 # TODO: Pin to full SHA before merging to main
        with:
          global-json-file: global.json
      - name: Pack NuGet packages
        run: dotnet pack -c Release --output ${{ env.NuGetDirectory }}
      - uses: actions/upload-artifact@v7 # TODO: Pin to full SHA before merging to main
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectory }}/*nupkg

  create-release-push:
    needs: [build-and-test, format, pack]
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    if: ${{ github.event.inputs.version != '' && github.actor == 'Bia10' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2 # TODO: Pin to full SHA before merging to main
        with:
          egress-policy: audit
      - uses: actions/checkout@v4 # TODO: Pin to full SHA before merging to main
      - name: Download nuget packages
        uses: actions/download-artifact@v4 # TODO: Pin to full SHA before merging to main
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4 # TODO: Pin to full SHA before merging to main
        with:
          global-json-file: global.json
      - name: Push packages
        shell: bash
        run: |
          dotnet nuget push "${{ env.NuGetDirectory }}"/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "${{ env.NuGetDirectory }}"/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
